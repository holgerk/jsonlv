<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: 0.03em;
      margin-right: 4px;
    }

    .stat {
      font-size: 11px;
      color: #8b949e;
      padding: 2px 8px;
      background: #21262d;
      border-radius: 12px;
      border: 1px solid #30363d;
    }
    .stat span { font-weight: 600; }
    .stat.errors span { color: #f85149; }
    .stat.warns  span { color: #e3b341; }
    .stat.total  span { color: #79c0ff; }

    .sep { width: 1px; height: 18px; background: #30363d; }

    .filter-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #8b949e;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .filter-btn.active        { background: #30363d; color: #e6edf3; border-color: #58a6ff; }
    .filter-btn.active.INFO   { border-color: #3fb950; color: #3fb950; }
    .filter-btn.active.WARN   { border-color: #e3b341; color: #e3b341; }
    .filter-btn.active.ERROR  { border-color: #f85149; color: #f85149; }
    .filter-btn.active.DEBUG  { border-color: #8b949e; color: #8b949e; }

    #autoscroll-btn {
      margin-left: auto;
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #8b949e;
      cursor: pointer;
    }
    #autoscroll-btn.on { border-color: #58a6ff; color: #58a6ff; background: #1c2d40; }

    #clear-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #8b949e;
      cursor: pointer;
    }
    #clear-btn:hover { background: #30363d; color: #e6edf3; }

    /* ── log list ── */
    #log-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    #log-list::-webkit-scrollbar { width: 6px; }
    #log-list::-webkit-scrollbar-track { background: #0d1117; }
    #log-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .entry {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 14px;
      border-bottom: 1px solid transparent;
      line-height: 1.6;
    }
    .entry:hover { background: #161b22; }

    @keyframes fadein { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; } }

    .entry[data-level="ERROR"] { background: rgba(248,81,73,0.05); }
    .entry[data-level="ERROR"]:hover { background: rgba(248,81,73,0.09); }
    .entry[data-level="WARN"]  { background: rgba(227,179,65,0.04); }
    .entry[data-level="WARN"]:hover  { background: rgba(227,179,65,0.08); }

    .ts      { color: #484f58; flex-shrink: 0; width: 90px; font-size: 11px; }
    .badge   { flex-shrink: 0; width: 42px; text-align: center; font-size: 10px; font-weight: 700; padding: 1px 4px; border-radius: 4px; letter-spacing: 0.04em; }
    .badge.INFO  { background: rgba(63,185,80,0.15);  color: #3fb950; }
    .badge.WARN  { background: rgba(227,179,65,0.15); color: #e3b341; }
    .badge.ERROR { background: rgba(248,81,73,0.15);  color: #f85149; }
    .badge.DEBUG { background: rgba(139,148,158,0.12); color: #8b949e; }

    .svc  { color: #79c0ff; flex-shrink: 0; width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msg  { color: #c9d1d9; flex: 1; }
    .entry[data-level="ERROR"] .msg { color: #ffa198; }
    .entry[data-level="WARN"]  .msg { color: #f0c040; }

    .meta { color: #484f58; flex-shrink: 0; font-size: 11px; }

    /* plain (non-JSON) lines */
    .entry.plain .msg { color: #8b949e; }

    /* ── empty state ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #30363d;
      gap: 8px;
    }
    #empty .icon { font-size: 36px; }
    #empty p { font-size: 13px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>Log Viewer</h1>
    <div class="stat total">Total <span id="cnt-total">0</span></div>
    <div class="stat errors">ERR <span id="cnt-error">0</span></div>
    <div class="stat warns">WARN <span id="cnt-warn">0</span></div>
    <div class="sep"></div>
    <button class="filter-btn active" data-level="ALL">All</button>
    <button class="filter-btn INFO"  data-level="INFO">INFO</button>
    <button class="filter-btn WARN"  data-level="WARN">WARN</button>
    <button class="filter-btn ERROR" data-level="ERROR">ERROR</button>
    <button class="filter-btn DEBUG" data-level="DEBUG">DEBUG</button>
    <button id="clear-btn">Clear</button>
    <button id="autoscroll-btn" class="on">⬇ Auto-scroll</button>
  </div>

  <div id="log-list">
    <div id="empty">
      <div class="icon">◎</div>
      <p>Waiting for log input…</p>
    </div>
  </div>

  <script>
    const MAX_DOM  = 2000;
    const BATCH    = 200;

    let domCount   = 0;
    let counts     = { total: 0, ERROR: 0, WARN: 0 };
    let activeFilter = 'ALL';
    let autoScroll = true;
    let rafPending = false;
    const queue    = [];

    const list     = document.getElementById('log-list');
    const empty    = document.getElementById('empty');
    const cntTotal = document.getElementById('cnt-total');
    const cntError = document.getElementById('cnt-error');
    const cntWarn  = document.getElementById('cnt-warn');

    function fmtTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (isNaN(d)) return ts.slice(11, 23) || ts;
      return d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildEntry(raw) {
      let level = '', service = '', message = raw, ts = '', meta = '';
      try {
        const o = JSON.parse(raw);
        level   = (o.level_name || o.level || '').toUpperCase();
        service = o.channel || o.service || o.logger || '';
        message = o.message || o.msg || o.error || raw;
        ts      = fmtTime(o.datetime || o.timestamp || o.time || o['@timestamp'] || '');
        const dur = o.duration_ms != null ? o.duration_ms + 'ms' : '';
        const st  = o.status_code  != null ? String(o.status_code) : '';
        meta = [dur, st].filter(Boolean).join(' · ');
        if (level === 'ERROR') counts.ERROR++;
        if (level === 'WARN')  counts.WARN++;
      } catch (_) {}
      counts.total++;

      const el = document.createElement('div');
      el.className = 'entry' + (level ? '' : ' plain');
      el.dataset.level = level;
      if (activeFilter !== 'ALL' && level !== activeFilter) el.classList.add('hidden');
      el.innerHTML =
        '<span class="ts">'                             + esc(ts)          + '</span>' +
        '<span class="badge ' + esc(level) + '">'      + esc(level||'—')  + '</span>' +
        '<span class="svc">'                            + esc(service)     + '</span>' +
        '<span class="msg">'                            + esc(message)     + '</span>' +
        (meta ? '<span class="meta">' + esc(meta) + '</span>' : '');
      return el;
    }

    function drainQueue() {
      rafPending = false;
      if (!queue.length) return;

      empty.classList.add('hidden');
      const n   = Math.min(BATCH, queue.length);
      const frag = document.createDocumentFragment();
      for (let i = 0; i < n; i++) frag.appendChild(buildEntry(queue[i]));
      queue.splice(0, n);
      domCount += n;

      list.appendChild(frag);

      while (domCount > MAX_DOM) {
        const el = list.querySelector('.entry');
        if (el) { el.remove(); domCount--; } else break;
      }

      cntTotal.textContent = counts.total;
      cntError.textContent = counts.ERROR;
      cntWarn.textContent  = counts.WARN;
      if (autoScroll) list.scrollTop = list.scrollHeight;

      if (queue.length) { rafPending = true; requestAnimationFrame(drainQueue); }
    }

    const es = new EventSource('/events');
    es.onmessage = function(e) {
      queue.push(e.data);
      if (!rafPending) { rafPending = true; requestAnimationFrame(drainQueue); }
    };

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.level;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        list.querySelectorAll('.entry').forEach(e => {
          e.classList.toggle('hidden', activeFilter !== 'ALL' && e.dataset.level !== activeFilter);
        });
      });
    });

    const asBtn = document.getElementById('autoscroll-btn');
    asBtn.addEventListener('click', () => {
      autoScroll = !autoScroll;
      asBtn.classList.toggle('on', autoScroll);
      if (autoScroll) list.scrollTop = list.scrollHeight;
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      list.querySelectorAll('.entry').forEach(e => e.remove());
      domCount = 0;
      counts = { total: 0, ERROR: 0, WARN: 0 };
      cntTotal.textContent = cntError.textContent = cntWarn.textContent = 0;
      empty.classList.remove('hidden');
    });
  </script>
</body>
</html>
