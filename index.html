<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── colour tokens (dark default) ── */
    :root {
      --bg:        #0d1117;
      --bg-2:      #161b22;
      --bg-3:      #1c2128;
      --bg-btn:    #21262d;
      --border:    #30363d;
      --text:      #c9d1d9;
      --text-hi:   #e6edf3;
      --text-dim:  #8b949e;
      --text-faint:#484f58;
      --svc-color: #79c0ff;
      --scrollbar: #30363d;
    }
    body.light {
      --bg:        #ffffff;
      --bg-2:      #f6f8fa;
      --bg-3:      #eaeef2;
      --bg-btn:    #f6f8fa;
      --border:    #d0d7de;
      --text:      #24292f;
      --text-hi:   #1f2328;
      --text-dim:  #57606a;
      --text-faint:#6e7781;
      --svc-color: #0969da;
      --scrollbar: #d0d7de;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: var(--font-size, 12px);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-hi);
      letter-spacing: 0.03em;
      margin-right: 4px;
    }

    .stat {
      font-size: 11px;
      color: var(--text-dim);
      padding: 2px 8px;
      background: var(--bg-btn);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stat span { font-weight: 600; }
    .stat.errors span { color: #f85149; }
    .stat.warns  span { color: #e3b341; }
    .stat.total  span { color: #79c0ff; }
    body.light .stat.total span { color: #0969da; }

    .sep { width: 1px; height: 18px; background: var(--border); }

    .filter-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-btn);
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .filter-btn.active        { background: var(--border); color: var(--text-hi); border-color: #58a6ff; }
    .filter-btn.active.INFO     { border-color: #3fb950; color: #3fb950; }
    .filter-btn.active.WARN     { border-color: #e3b341; color: #e3b341; }
    .filter-btn.active.ERROR    { border-color: #f85149; color: #f85149; }
    .filter-btn.active.CRITICAL { border-color: #ff2d55; color: #ff2d55; }
    .filter-btn.active.DEBUG    { border-color: var(--text-dim); color: var(--text-dim); }

    #autoscroll-btn {
      margin-left: auto;
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-btn);
      color: var(--text-dim);
      cursor: pointer;
    }
    #autoscroll-btn.on { border-color: #58a6ff; color: #58a6ff; background: #1c2d40; }
    body.light #autoscroll-btn.on { background: #ddf4ff; color: #0969da; border-color: #0969da; }

    #theme-btn, #clear-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-btn);
      color: var(--text-dim);
      cursor: pointer;
    }
    #theme-btn:hover, #clear-btn:hover { background: var(--border); color: var(--text-hi); }

    /* ── find bar ── */
    #find-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      background: var(--bg-3);
      border-bottom: 1px solid #388bfd55;
      flex-shrink: 0;
    }
    #find-bar.hidden { display: none !important; }

    #find-input {
      font-family: inherit;
      font-size: 12px;
      padding: 3px 8px;
      width: 220px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
    }
    #find-input:focus { border-color: #388bfd; }
    #find-input.no-results { border-color: #f85149; background: rgba(248,81,73,0.08); }

    #find-status {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 70px;
      white-space: nowrap;
    }
    #find-status.none { color: #f85149; }

    .find-btn {
      font-family: inherit;
      font-size: 13px;
      line-height: 1;
      padding: 2px 6px;
      background: var(--bg-btn);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      cursor: pointer;
    }
    .find-btn:hover { background: var(--border); color: var(--text-hi); }
    .find-btn:disabled { opacity: 0.3; cursor: default; }
    #find-close { margin-left: 2px; font-size: 14px; padding: 1px 5px; }

    /* ── highlight marks ── */
    mark {
      background: rgba(255, 214, 0, 0.35);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }
    mark.current { background: #ff8c00; color: #0d1117; border-radius: 2px; }
    body.light mark.current { color: #ffffff; }

    /* ── log list ── */
    #log-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #log-list::-webkit-scrollbar { width: 6px; }
    #log-list::-webkit-scrollbar-track { background: var(--bg); }
    #log-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .entry {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 14px;
      border-bottom: 1px solid transparent;
      line-height: 1.6;
      cursor: pointer;
    }
    .entry:hover { background: var(--bg-2); }

    .entry[data-level="ERROR"]    { background: rgba(248,81,73,0.05); }
    .entry[data-level="ERROR"]:hover { background: rgba(248,81,73,0.09); }
    .entry[data-level="CRITICAL"] { background: rgba(255,45,85,0.07); }
    .entry[data-level="CRITICAL"]:hover { background: rgba(255,45,85,0.11); }
    .entry[data-level="WARN"]     { background: rgba(227,179,65,0.04); }
    .entry[data-level="WARN"]:hover  { background: rgba(227,179,65,0.08); }

    .ts    { color: var(--text-faint); flex-shrink: 0; width: 7.5em; font-size: 0.9em; }
    .badge { flex-shrink: 0; width: 3.5em; text-align: center; font-size: 0.83em; font-weight: 700; padding: 1px 4px; border-radius: 4px; letter-spacing: 0.04em; }
    .badge.INFO     { background: rgba(63,185,80,0.15);   color: #3fb950; }
    .badge.WARN     { background: rgba(227,179,65,0.15);  color: #e3b341; }
    .badge.ERROR    { background: rgba(248,81,73,0.15);   color: #f85149; }
    .badge.CRITICAL { background: rgba(255,45,85,0.2);    color: #ff2d55; }
    .badge.DEBUG    { background: rgba(139,148,158,0.12); color: var(--text-dim); }

    .src  { color: var(--text-faint); flex-shrink: 0; max-width: 9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.83em; opacity: 0.8; }
    .svc  { color: var(--svc-color); flex-shrink: 0; width: 11.5em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msg  { color: var(--text); flex: 1; min-width: 0; overflow-wrap: break-word; word-break: break-word; }
    .entry[data-level="ERROR"]    .msg { color: #ffa198; }
    .entry[data-level="CRITICAL"] .msg { color: #ff6b8a; }
    .entry[data-level="WARN"]     .msg { color: #e3a008; }
    body.light .entry[data-level="ERROR"]    .msg { color: #cf222e; }
    body.light .entry[data-level="CRITICAL"] .msg { color: #a8123e; }
    body.light .entry[data-level="WARN"]     .msg { color: #9a6700; }

    .meta { color: var(--text-faint); flex-shrink: 0; font-size: 0.9em; }
    .entry.plain .msg { color: var(--text-dim); }
    .entry.expanded { border-bottom: none; background: var(--bg-3) !important; }

    /* ── details panel ── */
    .details {
      background: var(--bg-2);
      border-left: 3px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px 10px 56px;
    }
    .details pre {
      font-family: inherit;
      font-size: 0.9em;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text-dim);
    }
    .jk { color: var(--svc-color); }
    .js { color: #a5d6ff; }
    .jn { color: #f2cc60; }
    .jb { color: #ff7b72; }
    .jz { color: var(--text-faint); }
    body.light .js { color: #0a3069; }
    body.light .jn { color: #953800; }
    body.light .jb { color: #cf222e; }

    /* ── empty state ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--border);
      gap: 8px;
    }
    #empty .icon { font-size: 36px; }
    #empty p { font-size: 13px; }

    .hidden { display: none !important; }

    /* ── custom columns ── */
    .col {
      flex-shrink: 0;
      max-width: 13em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.9em;
      color: var(--text-dim);
      border-left: 1px solid var(--border);
      padding-left: 6px;
    }

    /* ── clickable property keys in detail panel ── */
    .prop-key { cursor: pointer; }
    .prop-key:hover { text-decoration: underline dotted; }

    /* ── file path links ── */
    .file-link { color: var(--svc-color); text-decoration: none; }
    .file-link:hover { text-decoration: underline; }

    /* ── path-mapping modal ── */
    #path-modal { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    #path-modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
    #path-modal-box { position: relative; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 22px 24px; max-width: 520px; width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.4); }
    #path-modal-box h2 { font-size: 13px; font-weight: 600; color: var(--text-hi); margin-bottom: 8px; }
    #path-modal-file { font-size: 11px; color: var(--svc-color); background: var(--bg-3); border-radius: 6px; padding: 6px 10px; margin-bottom: 10px; word-break: break-all; }
    #path-modal-box p { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }
    #path-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn { font-family: inherit; font-size: 11px; padding: 5px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-btn); color: var(--text); cursor: pointer; }
    .modal-btn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .modal-btn:hover:not(:disabled) { opacity: 0.85; }
    .modal-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── context menu ── */
    #ctx-menu {
      position: fixed;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 0;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 9999;
      min-width: 170px;
      font-size: 12px;
    }
    .ctx-item {
      padding: 6px 14px;
      cursor: pointer;
      color: var(--text);
      white-space: nowrap;
    }
    .ctx-item:hover { background: var(--border); }
    .ctx-item.disabled { color: var(--text-faint); cursor: default; }
    .ctx-item.disabled:hover { background: transparent; }
    .ctx-label {
      padding: 4px 14px 2px;
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body class="light">
  <div id="toolbar">
    <h1>Log Viewer</h1>
    <div class="stat total">Total <span id="cnt-total">0</span></div>
    <div class="stat errors">ERR <span id="cnt-error">0</span></div>
    <div class="stat warns">WARN <span id="cnt-warn">0</span></div>
    <div class="sep"></div>
    <button class="filter-btn active" data-level="ALL">All</button>
    <button class="filter-btn INFO"     data-level="INFO">INFO</button>
    <button class="filter-btn WARN"     data-level="WARN">WARN</button>
    <button class="filter-btn ERROR"    data-level="ERROR">ERROR</button>
    <button class="filter-btn CRITICAL" data-level="CRITICAL">CRITICAL</button>
    <button class="filter-btn DEBUG"    data-level="DEBUG">DEBUG</button>
    <button id="clear-btn">Clear</button>
    <button id="theme-btn">🌙 Dark</button>
    <button id="autoscroll-btn" class="on">⬇ Auto-scroll</button>
  </div>

  <div id="find-bar" class="hidden">
    <input id="find-input" type="text" placeholder="Suchen…" autocomplete="off" spellcheck="false">
    <span id="find-status"></span>
    <button class="find-btn" id="find-prev" title="Vorherige (Shift+Enter)">↑</button>
    <button class="find-btn" id="find-next" title="Nächste (Enter)">↓</button>
    <button class="find-btn" id="find-close" title="Schließen (Escape)">✕</button>
  </div>

  <div id="ctx-menu" class="hidden">
    <div class="ctx-label" id="ctx-prop-label"></div>
    <div class="ctx-item" id="ctx-add-col">Spalte hinzufügen</div>
    <div class="ctx-item" id="ctx-rem-col">Spalte entfernen</div>
  </div>

  <div id="log-list">
    <div id="empty">
      <div class="icon">◎</div>
      <p>Waiting for log input…</p>
    </div>
  </div>

  <div id="path-modal" class="hidden">
    <div id="path-modal-overlay"></div>
    <div id="path-modal-box">
      <h2>Kein Pfad-Mapping gefunden</h2>
      <div id="path-modal-file"></div>
      <p>Diese Datei existiert nicht lokal. Bitte wähle die entsprechende Datei aus — das Mapping wird gespeichert und gilt für alle weiteren Öffnungen automatisch.</p>
      <div id="path-modal-actions">
        <button class="modal-btn" id="path-modal-cancel">Abbrechen</button>
        <button class="modal-btn primary" id="path-modal-pick">Datei auswählen…</button>
      </div>
    </div>
  </div>

  <script>
    const BATCH      = 200;
    const rawData    = new WeakMap(); // entry → raw log line string
    const sourceData = new WeakMap(); // entry → source filename
    let customColumns = [];

    let domCount     = 0;
    let counts       = { total: 0, INFO: 0, WARN: 0, ERROR: 0, CRITICAL: 0, DEBUG: 0 };
    let activeFilter = 'ALL';
    let autoScroll   = true;
    let rafPending   = false;
    const queue      = [];

    // find state
    let findMatches  = [];
    let findIdx      = -1;
    let findTerm     = '';
    let findTimer    = null;

    const list       = document.getElementById('log-list');
    const empty      = document.getElementById('empty');
    const cntTotal   = document.getElementById('cnt-total');
    const cntError   = document.getElementById('cnt-error');
    const cntWarn    = document.getElementById('cnt-warn');
    const findBar    = document.getElementById('find-bar');
    const findInput  = document.getElementById('find-input');
    const findStatus = document.getElementById('find-status');

    // ── helpers ──────────────────────────────────────────────────────────────

    function fmtTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (isNaN(d)) return ts.slice(11, 23) || ts;
      return d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── entry building ────────────────────────────────────────────────────────

    function buildEntry(item) {
      const src = item.s || '';
      const raw = item.d;
      let level = '', service = '', message = raw, ts = '', meta = '';
      let parsedObj = null;
      try {
        parsedObj = JSON.parse(raw);
        level   = (parsedObj.level_name || parsedObj.level || '').toUpperCase();
        if (level === 'WARNING') level = 'WARN';
        service = parsedObj.channel || parsedObj.service || parsedObj.logger || '';
        message = parsedObj.message || parsedObj.msg || parsedObj.error || raw;
        ts      = fmtTime(parsedObj.datetime || parsedObj.timestamp || parsedObj.time || parsedObj['@timestamp'] || '');
        const dur = parsedObj.duration_ms != null ? parsedObj.duration_ms + 'ms' : '';
        const st  = parsedObj.status_code  != null ? String(parsedObj.status_code) : '';
        meta = [dur, st].filter(Boolean).join(' · ');
        if (counts[level] !== undefined) counts[level]++;
      } catch (_) {}
      counts.total++;

      const el = document.createElement('div');
      el.className = 'entry' + (level ? '' : ' plain');
      el.dataset.level = level;
      if (activeFilter !== 'ALL' && level !== activeFilter) el.classList.add('hidden');
      const colsHtml = customColumns.map(function(prop) {
        let v = '';
        if (prop === '_source') {
          v = src;
        } else if (parsedObj !== null) {
          const val = getNestedValue(parsedObj, prop);
          if (val !== undefined && val !== null && typeof val !== 'object') v = String(val);
        }
        const display = v.length > 35 ? v.slice(0, 35) + '…' : v;
        return '<span class="col" data-col="' + esc(prop) + '" title="' + esc(prop + ': ' + v) + '">' + esc(display) + '</span>';
      }).join('');

      el.innerHTML =
        '<span class="ts">'                        + esc(ts)         + '</span>' +
        '<span class="badge ' + esc(level) + '">'  + esc(level||'—') + '</span>' +
        (src ? '<span class="src">' + esc(src) + '</span>' : '') +
        '<span class="svc">'                       + esc(service)    + '</span>' +
        colsHtml +
        '<span class="msg">'                       + esc(message)    + '</span>' +
        (meta ? '<span class="meta">' + esc(meta) + '</span>' : '');
      const msgEl = el.querySelector('.msg');
      if (msgEl) linkifyFilePaths(msgEl);
      rawData.set(el, raw);
      sourceData.set(el, src);
      return el;
    }

    function syntaxHighlight(obj) {
      const s = JSON.stringify(obj, null, 2)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return s.replace(
        /("(?:\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|true|false|null|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        function(m) {
          if (/^"/.test(m)) return m.endsWith(':') ? '<span class="jk">'+m+'</span>' : '<span class="js">'+m+'</span>';
          if (m==='true'||m==='false') return '<span class="jb">'+m+'</span>';
          if (m==='null') return '<span class="jz">'+m+'</span>';
          return '<span class="jn">'+m+'</span>';
        });
    }

    function getNestedValue(obj, path) {
      const parts = path.split('.');
      let cur = obj;
      for (const p of parts) {
        if (cur == null || typeof cur !== 'object') return undefined;
        cur = cur[p];
      }
      return cur;
    }

    // ── file path linking ─────────────────────────────────────────────────────

    // Matches absolute paths with ≥1 directory component and a file extension,
    // optionally followed by :line.
    const FILE_PATH_RE = /(\/(?:[^\s'"<>\]]+\/)+[^\s'"<>\]/]+\.[a-zA-Z0-9]{1,10})(?::(\d+))?/g;

    async function openFile(file, line) {
      try {
        const u = '/open?file=' + encodeURIComponent(file) + (line ? '&line=' + encodeURIComponent(line) : '');
        const res = await fetch(u);
        if (!res.ok) return;
        const data = await res.json();
        if (data.status === 'not_found') showPathModal(file, line || '');
      } catch(_) {}
    }

    function linkifyFilePaths(el) {
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
      const nodes = [];
      let node;
      while ((node = walker.nextNode())) nodes.push(node);
      nodes.forEach(function(tn) {
        FILE_PATH_RE.lastIndex = 0;
        const text = tn.textContent;
        let match, last = 0;
        const frag = document.createDocumentFragment();
        while ((match = FILE_PATH_RE.exec(text)) !== null) {
          if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
          const filePath = match[1], lineNum = match[2] || '';
          const a = document.createElement('a');
          a.href = '#';
          a.className = 'file-link';
          a.textContent = match[0];
          a.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); openFile(filePath, lineNum); });
          frag.appendChild(a);
          last = match.index + match[0].length;
        }
        if (last === 0) return;
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        tn.parentNode.replaceChild(frag, tn);
      });
    }

    function annotateTopLevelKeys(pre) {
      const stack = [];
      pre.querySelectorAll('.jk').forEach(function(span) {
        const prev = span.previousSibling;
        if (!prev || prev.nodeType !== Node.TEXT_NODE) return;
        const text  = prev.textContent;
        const after = text.slice(text.lastIndexOf('\n') + 1);
        const depth = after.length / 2; // 2 spaces per indent level → depth 1 = top-level
        if (depth < 1) return;
        const raw  = span.textContent;
        const name = raw.slice(1, raw.lastIndexOf('"'));
        while (stack.length >= depth) stack.pop();
        stack.push(name);
        span.classList.add('prop-key');
        span.dataset.prop = stack.join('.');
      });
    }

    function buildDetailsPanel(raw, src) {
      const panel = document.createElement('div');
      panel.className = 'details';
      const pre = document.createElement('pre');
      try {
        const obj = JSON.parse(raw);
        if (src) obj._source = src;
        pre.innerHTML = syntaxHighlight(obj);
        annotateTopLevelKeys(pre);
        linkifyFilePaths(pre);
      } catch (_) { pre.textContent = raw; linkifyFilePaths(pre); }
      panel.appendChild(pre);
      return panel;
    }

    // ── context menu ─────────────────────────────────────────────────────────

    const ctxMenu      = document.getElementById('ctx-menu');
    const ctxPropLabel = document.getElementById('ctx-prop-label');
    const ctxAddCol    = document.getElementById('ctx-add-col');
    const ctxRemCol    = document.getElementById('ctx-rem-col');
    let ctxProp = null;

    function openCtxMenu(x, y, prop) {
      ctxProp = prop;
      ctxPropLabel.textContent = prop;
      const exists = customColumns.includes(prop);
      ctxAddCol.classList.toggle('disabled', exists);
      ctxRemCol.classList.toggle('disabled', !exists);
      // keep menu inside viewport
      ctxMenu.classList.remove('hidden');
      const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
      ctxMenu.style.left = Math.min(x, window.innerWidth  - mw - 8) + 'px';
      ctxMenu.style.top  = Math.min(y, window.innerHeight - mh - 8) + 'px';
    }

    function closeCtxMenu() { ctxMenu.classList.add('hidden'); }

    ctxAddCol.addEventListener('click', function() {
      if (ctxProp && !customColumns.includes(ctxProp)) {
        customColumns.push(ctxProp);
        addColumnToEntries(ctxProp);
      }
      closeCtxMenu();
    });

    ctxRemCol.addEventListener('click', function() {
      if (ctxProp) {
        customColumns = customColumns.filter(function(c) { return c !== ctxProp; });
        removeColumnFromEntries(ctxProp);
      }
      closeCtxMenu();
    });

    document.addEventListener('click', function(e) {
      if (!ctxMenu.contains(e.target)) closeCtxMenu();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeCtxMenu();
    });

    function withScrollAnchor(fn) {
      const listRect = list.getBoundingClientRect();
      let anchor = null, anchorTop = 0;
      for (const entry of list.querySelectorAll('.entry')) {
        const r = entry.getBoundingClientRect();
        if (r.bottom > listRect.top) { anchor = entry; anchorTop = r.top; break; }
      }
      fn();
      if (anchor) list.scrollTop += anchor.getBoundingClientRect().top - anchorTop;
    }

    function addColumnToEntries(prop) {
      withScrollAnchor(function() {
        list.querySelectorAll('.entry').forEach(function(entry) {
          let v = '';
          if (prop === '_source') {
            v = sourceData.get(entry) || '';
          } else {
            const raw = rawData.get(entry);
            try {
              const o = JSON.parse(raw);
              const val = getNestedValue(o, prop);
              if (val !== undefined && val !== null && typeof val !== 'object') v = String(val);
            } catch(_) {}
          }
          const display = v.length > 35 ? v.slice(0, 35) + '…' : v;
          const span = document.createElement('span');
          span.className = 'col';
          span.dataset.col = prop;
          span.title = prop + ': ' + v;
          span.textContent = display;
          const msg = entry.querySelector('.msg');
          if (msg) entry.insertBefore(span, msg);
        });
      });
    }

    function removeColumnFromEntries(prop) {
      withScrollAnchor(function() {
        list.querySelectorAll('.entry .col[data-col="' + prop + '"]').forEach(function(s) { s.remove(); });
      });
    }

    // ── details expand ────────────────────────────────────────────────────────

    list.addEventListener('click', function(e) {
      if (window.getSelection().toString()) return;

      // Property key click → context menu
      const propKey = e.target.closest('.prop-key');
      if (propKey) {
        e.stopPropagation();
        openCtxMenu(e.clientX, e.clientY, propKey.dataset.prop);
        return;
      }

      const entry = e.target.closest('.entry');
      if (!entry) return;

      const next = entry.nextElementSibling;
      if (next && next.classList.contains('details')) {
        next.remove();
        entry.classList.remove('expanded');
        return;
      }

      const raw = rawData.get(entry);
      const src = sourceData.get(entry);
      const panel = buildDetailsPanel(raw, src);
      entry.after(panel);
      entry.classList.add('expanded');
      if (findTerm) {
        markTextNodes(panel.querySelector('pre'), findTerm.toLowerCase(), findTerm);
        findMatches = Array.from(list.querySelectorAll('mark'));
        updateFindStatus();
      }
    });

    // ── queue drain ───────────────────────────────────────────────────────────

    function drainQueue() {
      rafPending = false;
      if (!queue.length) return;

      empty.classList.add('hidden');
      const n    = Math.min(BATCH, queue.length);
      const frag = document.createDocumentFragment();
      for (let i = 0; i < n; i++) frag.appendChild(buildEntry(queue[i]));
      queue.splice(0, n);
      domCount += n;
      list.appendChild(frag);

      cntTotal.textContent = counts.total;
      cntError.textContent = counts.ERROR;
      cntWarn.textContent  = counts.WARN;
      updateFilterCounts();
      if (autoScroll) list.scrollTop = list.scrollHeight;
      if (queue.length) { rafPending = true; requestAnimationFrame(drainQueue); }
    }

    // ── find / search ─────────────────────────────────────────────────────────

    function openFind() {
      findBar.classList.remove('hidden');
      findInput.focus();
      findInput.select();
      autoScroll = false;
      document.getElementById('autoscroll-btn').classList.remove('on');
    }

    function closeFind() {
      findBar.classList.add('hidden');
      collapseAutoExpanded();
      clearMarks();
      findInput.value = '';
      findStatus.textContent = '';
      findStatus.className = '';
      findTerm = '';
    }

    function collapseAutoExpanded() {
      list.querySelectorAll('.details[data-auto]').forEach(function(d) {
        if (d.previousElementSibling) d.previousElementSibling.classList.remove('expanded');
        d.remove();
      });
    }

    function markTextNodes(el, lterm, term) {
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
      const nodes  = [];
      let node;
      while ((node = walker.nextNode())) nodes.push(node);

      nodes.forEach(function(tn) {
        const text  = tn.textContent;
        const lower = text.toLowerCase();
        let pos = lower.indexOf(lterm);
        if (pos === -1) return;

        const frag = document.createDocumentFragment();
        let last = 0;
        while (pos !== -1) {
          if (pos > last) frag.appendChild(document.createTextNode(text.slice(last, pos)));
          const m = document.createElement('mark');
          m.textContent = text.slice(pos, pos + term.length);
          frag.appendChild(m);
          last = pos + term.length;
          pos  = lower.indexOf(lterm, last);
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        tn.parentNode.replaceChild(frag, tn);
      });
    }

    function clearMarks() {
      list.querySelectorAll('mark').forEach(function(m) {
        const parent = m.parentNode;
        parent.replaceChild(document.createTextNode(m.textContent), m);
        parent.normalize();
      });
      findMatches = [];
      findIdx     = -1;
    }

    const MAX_AUTO_EXPAND = 200;

    function doSearch(term) {
      collapseAutoExpanded();
      clearMarks();
      findTerm = term;
      if (!term) { updateFindStatus(); return; }

      const lterm = term.toLowerCase();
      const entries = Array.from(list.querySelectorAll('.entry'));

      // First pass: mark visible spans + collect entries with raw JSON matches
      const needExpand = [];
      entries.forEach(function(entry) {
        markTextNodes(entry.querySelector('.msg'), lterm, term);
        markTextNodes(entry.querySelector('.svc'), lterm, term);
        markTextNodes(entry.querySelector('.ts'),  lterm, term);
        const raw = rawData.get(entry);
        if (raw && raw.toLowerCase().includes(lterm)) needExpand.push(entry);
      });

      // Second pass: auto-expand (capped to avoid DOM explosion)
      needExpand.slice(0, MAX_AUTO_EXPAND).forEach(function(entry) {
        let panel = entry.nextElementSibling;
        if (!panel || !panel.classList.contains('details')) {
          panel = buildDetailsPanel(rawData.get(entry), sourceData.get(entry));
          panel.dataset.auto = '1';
          entry.after(panel);
          entry.classList.add('expanded');
        }
        markTextNodes(panel.querySelector('pre'), lterm, term);
      });

      findMatches = Array.from(list.querySelectorAll('mark'));
      findIdx     = findMatches.length > 0 ? 0 : -1;
      if (findIdx >= 0) activateCurrent();
      updateFindStatus();
    }

    function activateCurrent() {
      findMatches.forEach(function(m, i) { m.classList.toggle('current', i === findIdx); });
      findMatches[findIdx].scrollIntoView({ block: 'center', behavior: 'instant' });
    }

    function findNext() {
      if (!findMatches.length) return;
      findIdx = (findIdx + 1) % findMatches.length;
      activateCurrent();
      updateFindStatus();
    }

    function findPrev() {
      if (!findMatches.length) return;
      findIdx = (findIdx - 1 + findMatches.length) % findMatches.length;
      activateCurrent();
      updateFindStatus();
    }

    function updateFindStatus() {
      if (!findTerm) { findStatus.textContent = ''; findStatus.className = ''; return; }
      if (!findMatches.length) {
        findStatus.textContent = 'Keine Treffer';
        findStatus.className   = 'none';
        findInput.classList.add('no-results');
      } else {
        findStatus.textContent = (findIdx + 1) + ' / ' + findMatches.length;
        findStatus.className   = '';
        findInput.classList.remove('no-results');
      }
    }

    // find bar events
    findInput.addEventListener('input', function() {
      clearTimeout(findTimer);
      findTimer = setTimeout(function() { doSearch(findInput.value); }, 150);
    });
    findInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter')  { e.preventDefault(); e.shiftKey ? findPrev() : findNext(); }
      if (e.key === 'Escape') { e.preventDefault(); closeFind(); }
    });
    document.getElementById('find-prev').addEventListener('click', findPrev);
    document.getElementById('find-next').addEventListener('click', findNext);
    document.getElementById('find-close').addEventListener('click', closeFind);

    // ── theme toggle ─────────────────────────────────────────────────────────

    const themeBtn = document.getElementById('theme-btn');
    themeBtn.addEventListener('click', function() {
      const light = document.body.classList.toggle('light');
      themeBtn.textContent = light ? '🌙 Dark' : '☀ Light';
    });

    // ── global keyboard shortcuts ─────────────────────────────────────────────

    let fontSize = 12;
    function applyFontSize() {
      if (autoScroll) {
        document.documentElement.style.setProperty('--font-size', fontSize + 'px');
        list.scrollTop = list.scrollHeight;
        return;
      }
      withScrollAnchor(function() {
        document.documentElement.style.setProperty('--font-size', fontSize + 'px');
      });
    }

    document.addEventListener('keydown', function(e) {
      if (e.metaKey && e.key === 'f') { e.preventDefault(); openFind(); }
      if (e.metaKey && e.key === 'q') { e.preventDefault(); window.nativeQuit(); }
      if (e.metaKey && (e.key === '=' || e.key === '+')) { e.preventDefault(); fontSize = Math.min(fontSize + 1, 24); applyFontSize(); }
      if (e.metaKey && e.key === '-') { e.preventDefault(); fontSize = Math.max(fontSize - 1, 8);  applyFontSize(); }
    });

    // ── SSE ───────────────────────────────────────────────────────────────────

    const es = new EventSource('/events');
    es.onmessage = function(e) {
      try {
        const msg = JSON.parse(e.data);
        queue.push(msg);
      } catch (_) {
        queue.push({ s: '', d: e.data });
      }
      if (!rafPending) { rafPending = true; requestAnimationFrame(drainQueue); }
    };

    // ── filter button counts ──────────────────────────────────────────────────

    function updateFilterCounts() {
      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        const lvl = btn.dataset.level;
        if (lvl === 'ALL') {
          btn.textContent = 'All ' + counts.total;
        } else if (counts[lvl] !== undefined) {
          btn.textContent = lvl + ' ' + counts[lvl];
        }
      });
    }

    // ── filter buttons ────────────────────────────────────────────────────────

    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeFilter = btn.dataset.level;
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        list.querySelectorAll('.entry').forEach(function(e) {
          e.classList.toggle('hidden', activeFilter !== 'ALL' && e.dataset.level !== activeFilter);
        });
      });
    });

    // ── auto-scroll ───────────────────────────────────────────────────────────

    const asBtn = document.getElementById('autoscroll-btn');

    function setAutoScroll(on) {
      autoScroll = on;
      asBtn.classList.toggle('on', on);
      if (on) list.scrollTop = list.scrollHeight;
    }

    asBtn.addEventListener('click', function() { setAutoScroll(!autoScroll); });

    let userScrolling = false;
    list.addEventListener('scroll', function() {
      if (userScrolling) {
        const atBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 8;
        setAutoScroll(atBottom);
      }
    });
    list.addEventListener('wheel',     function() { userScrolling = true; });
    list.addEventListener('touchmove', function() { userScrolling = true; });

    // ── clear ─────────────────────────────────────────────────────────────────

    document.getElementById('clear-btn').addEventListener('click', function() {
      list.querySelectorAll('.entry').forEach(function(e) { e.remove(); });
      domCount = 0;
      counts   = { total: 0, INFO: 0, WARN: 0, ERROR: 0, CRITICAL: 0, DEBUG: 0 };
      updateFilterCounts();
      cntTotal.textContent = cntError.textContent = cntWarn.textContent = 0;
      empty.classList.remove('hidden');
      if (findTerm) closeFind();
    });
    // ── path-mapping modal ───────────────────────────────────────────────────

    let pathModalFile = '', pathModalLine = '';
    const pathModal     = document.getElementById('path-modal');
    const pathModalFileEl = document.getElementById('path-modal-file');

    function showPathModal(file, line) {
      pathModalFile = file;
      pathModalLine = line;
      pathModalFileEl.textContent = file;
      pathModal.classList.remove('hidden');
    }

    document.getElementById('path-modal-overlay').addEventListener('click', function() {
      pathModal.classList.add('hidden');
    });
    document.getElementById('path-modal-cancel').addEventListener('click', function() {
      pathModal.classList.add('hidden');
    });
    document.getElementById('path-modal-pick').addEventListener('click', async function() {
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Warte…';
      try {
        const res = await fetch('/pick-file?remote=' + encodeURIComponent(pathModalFile));
        if (res.ok) {
          pathModal.classList.add('hidden');
          await openFile(pathModalFile, pathModalLine);
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Datei auswählen…';
      }
    });
  </script>
</body>
</html>
